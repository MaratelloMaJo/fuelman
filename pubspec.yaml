name: fuelman
description: "FuelMan — умный учёт расхода топлива"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  get: ^4.6.6

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # File system
  path_provider: ^2.1.4

  # Charts
  fl_chart: ^1.2.0

  # Export / sharing
  share_plus: ^13.1.0

  # Date formatting
  intl: ^0.20.2

  # Persist theme preference
  shared_preferences: ^2.3.3

  # Optional local notifications (fuel reminders)
  flutter_local_notifications: ^21.0.0
  file_picker: ^12.0.0-beta.4
  http: ^1.6.0
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: "^2.4.0"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/icon.png
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
