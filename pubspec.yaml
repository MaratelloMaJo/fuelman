name: fuelman
description: "FuelMan — умный учёт расхода топлива"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  get: ^4.6.6

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # File system
  path_provider: ^2.1.4

  # Charts
  fl_chart: ^1.2.0

  # Export / sharing
  share_plus: ^13.1.0

  # Date formatting
  intl: ^0.20.2

  # Persist theme preference
  shared_preferences: ^2.3.3

  # Optional local notifications (fuel reminders)
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
